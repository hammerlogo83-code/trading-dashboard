<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USD/CHF Signal Dashboard</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0c10; color:#c8d4e8; font-family:Arial,sans-serif; padding:16px; }
  h1 { font-size:24px; color:#e8f0ff; margin-bottom:16px; }
  .card { background:#111418; border:1px solid #1e2530; border-radius:10px; padding:16px; margin-bottom:12px; }
  .price { font-size:40px; font-weight:bold; color:#e8f0ff; font-family:monospace; }
  .change { font-size:14px; margin-top:4px; font-family:monospace; }
  .up { color:#00e5a0; } .down { color:#ff4d6d; }
  .signal { text-align:center; padding:16px; border-radius:8px; border:2px solid; margin:12px 0; }
  .signal.buy  { border-color:#00e5a0; background:rgba(0,229,160,.1); }
  .signal.sell { border-color:#ff4d6d; background:rgba(255,77,109,.1); }
  .signal.hold { border-color:#f0b429; background:rgba(240,180,41,.1); }
  .signal-text { font-size:40px; font-weight:bold; font-family:monospace; }
  .buy .signal-text  { color:#00e5a0; }
  .sell .signal-text { color:#ff4d6d; }
  .hold .signal-text { color:#f0b429; }
  .signal-desc { font-size:13px; margin-top:6px; line-height:1.5; }
  .row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #1e2530; font-size:13px; }
  .row:last-child { border-bottom:none; }
  .label { color:#3a4455; }
  .val { font-family:monospace; }
  .ind-buy  { color:#00e5a0; font-size:11px; background:rgba(0,229,160,.15); padding:2px 8px; border-radius:4px; }
  .ind-sell { color:#ff4d6d; font-size:11px; background:rgba(255,77,109,.15); padding:2px 8px; border-radius:4px; }
  .ind-hold { color:#f0b429; font-size:11px; background:rgba(240,180,41,.15); padding:2px 8px; border-radius:4px; }
  .bar-wrap { margin:6px 0; }
  .bar-label { display:flex; justify-content:space-between; font-size:12px; margin-bottom:3px; }
  .bar-track { height:6px; background:#1e2530; border-radius:3px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:3px; transition:width .8s; }
  .bar-buy  { background:#00e5a0; }
  .bar-sell { background:#ff4d6d; }
  .bar-hold { background:#3a4455; }
  .entry-alert { border-radius:10px; padding:14px; margin-bottom:12px; border:2px solid; display:none; }
  .entry-alert.buy  { border-color:#00e5a0; background:rgba(0,229,160,.1); }
  .entry-alert.sell { border-color:#ff4d6d; background:rgba(255,77,109,.1); }
  .entry-title { font-size:15px; font-weight:bold; color:#e8f0ff; margin-bottom:4px; }
  .entry-desc  { font-size:12px; line-height:1.5; }
  .status { font-size:11px; color:#3a4455; margin-top:12px; }
  .btn { background:#3d7fff; color:#fff; border:none; padding:8px 18px; border-radius:6px; font-size:13px; cursor:pointer; margin-top:10px; }
  .loading-msg { text-align:center; padding:40px; color:#3d7fff; font-family:monospace; font-size:14px; }
  .err { background:rgba(255,77,109,.1); border:1px solid #ff4d6d; border-radius:8px; padding:12px; color:#ff4d6d; font-size:13px; margin-bottom:12px; display:none; }
</style>
</head>
<body>

<h1>USD / CHF &nbsp;<span style="font-size:13px;color:#3a4455;">Signal Dashboard</span></h1>

<div id="errBox" class="err"></div>
<div id="entryAlert" class="entry-alert">
  <div id="entryTitle" class="entry-title"></div>
  <div id="entryDesc"  class="entry-desc"></div>
</div>

<div id="mainContent" class="loading-msg">⏳ Lade Kursdaten...</div>

<script>
// ── Math ──────────────────────────────────────────────────────────────────
const avg = a => a.reduce((s,v)=>s+v,0)/a.length;

function sma(d,n){ return d.map((_,i)=>i<n-1?null:avg(d.slice(i-n+1,i+1))); }

function ema(d,n){
  const k=2/(n+1), r=[d[0]];
  for(let i=1;i<d.length;i++) r.push(d[i]*k+r[i-1]*(1-k));
  return r;
}

function rsi(d,n=14){
  let g=0,l=0;
  for(let i=1;i<=n;i++){const x=d[i]-d[i-1]; x>=0?g+=x:l-=x;}
  let ag=g/n, al=l/n;
  const r=new Array(n).fill(null);
  r.push(100-100/(1+ag/(al||1e-9)));
  for(let i=n+1;i<d.length;i++){
    const x=d[i]-d[i-1];
    ag=(ag*(n-1)+Math.max(x,0))/n;
    al=(al*(n-1)+Math.max(-x,0))/n;
    r.push(100-100/(1+ag/(al||1e-9)));
  }
  return r;
}

function macd(d){
  const fe=ema(d,12),se=ema(d,26);
  const ml=fe.map((v,i)=>v-se[i]);
  const sl=ema(ml,9);
  return {ml,sl};
}

function bollinger(d,n=20){
  const s=sma(d,n);
  return d.map((v,i)=>{
    if(!s[i]) return null;
    const sl=d.slice(Math.max(0,i-n+1),i+1);
    const std=Math.sqrt(sl.reduce((a,x)=>a+(x-avg(sl))**2,0)/sl.length);
    const u=s[i]+2*std, lo=s[i]-2*std;
    return (v-lo)/(u-lo);
  });
}

function stoch(c,h,l,k=14){
  return c.map((v,i)=>{
    if(i<k-1) return null;
    const hh=Math.max(...h.slice(i-k+1,i+1));
    const ll=Math.min(...l.slice(i-k+1,i+1));
    return hh===ll?50:((v-ll)/(hh-ll))*100;
  });
}

// ── Fetch ─────────────────────────────────────────────────────────────────
async function loadData(){
  document.getElementById('errBox').style.display='none';
  document.getElementById('mainContent').innerHTML='<div class="loading-msg">⏳ Verbinde mit Frankfurter API...</div>';

  try {
    // Get latest rate
    const r1 = await fetch('https://api.frankfurter.app/latest?from=USD&to=CHF');
    const j1 = await r1.json();
    const latest = j1.rates.CHF;

    document.getElementById('mainContent').innerHTML='<div class="loading-msg">⏳ Lade Verlaufsdaten...</div>';

    // Get 90 days history
    const r2 = await fetch('https://api.frankfurter.app/1995-01-01..?from=USD&to=CHF&base=USD');
    // Use simpler endpoint
    const end = new Date();
    const start = new Date(); start.setDate(end.getDate()-100);
    const fmt = d=>d.toISOString().split('T')[0];
    const r3 = await fetch(`https://api.frankfurter.app/${fmt(start)}..${fmt(end)}?from=USD&to=CHF`);
    const j3 = await r3.json();

    const dates = Object.keys(j3.rates).sort();
    const closes = dates.map(dt=>j3.rates[dt].CHF);
    // Replace last with freshest
    closes[closes.length-1] = latest;

    // Build OHLC
    const highs  = closes.map((c,i)=>c + Math.abs(c-(closes[i-1]||c))*0.3 + c*0.001);
    const lows   = closes.map((c,i)=>c - Math.abs(c-(closes[i-1]||c))*0.3 - c*0.001);

    renderDashboard(dates, closes, highs, lows);

  } catch(e) {
    document.getElementById('errBox').style.display='block';
    document.getElementById('errBox').textContent='⚠ Fehler: '+e.message;
    document.getElementById('mainContent').innerHTML='<button class="btn" onclick="loadData()">↻ Erneut versuchen</button>';
  }
}

// ── Render ────────────────────────────────────────────────────────────────
function renderDashboard(dates, closes, highs, lows){
  const last  = closes[closes.length-1];
  const prev  = closes[closes.length-2];
  const chg   = last-prev, chgP=(chg/prev)*100;

  const rsiA  = rsi(closes);
  const sma20 = sma(closes,20);
  const sma50 = sma(closes,Math.min(50,closes.length-1));
  const macdD = macd(closes);
  const bbA   = bollinger(closes);
  const stochA= stoch(closes,highs,lows);
  const ema9  = ema(closes,9);
  const ema21 = ema(closes,21);

  const rsiL  = rsiA[rsiA.length-1];
  const sma20L= sma20[sma20.length-1];
  const sma50L= sma50[sma50.length-1];
  const macdL = macdD.ml[macdD.ml.length-1];
  const macdSL= macdD.sl[macdD.sl.length-1];
  const bbL   = bbA[bbA.length-1];
  const stochL= stochA[stochA.length-1];
  const ema9L = ema9[ema9.length-1];
  const ema21L= ema21[ema21.length-1];

  const sigs = {
    rsi:   rsiL<35?'buy':rsiL>65?'sell':'hold',
    macd:  macdL>macdSL?'buy':'sell',
    sma20: last>sma20L?'buy':'sell',
    sma50: sma50L?last>sma50L?'buy':'sell':'hold',
    bb:    bbL!=null?bbL<0.2?'buy':bbL>0.8?'sell':'hold':'hold',
    stoch: stochL!=null?stochL<25?'buy':stochL>75?'sell':'hold':'hold',
    ema:   ema9L>ema21L?'buy':'sell',
  };

  const vals=Object.values(sigs);
  const buyC=vals.filter(s=>s==='buy').length;
  const selC=vals.filter(s=>s==='sell').length;
  const holC=vals.filter(s=>s==='hold').length;
  const total=vals.length;
  const score=(buyC-selC)/total;

  let sig,cls;
  if(score>0.2){sig='BUY';cls='buy';}
  else if(score<-0.2){sig='SELL';cls='sell';}
  else{sig='HOLD';cls='hold';}
  const conf=Math.round(Math.abs(score)*100);

  const hiR=Math.max(...highs.slice(-30)), loR=Math.min(...lows.slice(-30));

  // Entry point detection
  const alerts=[];
  if(rsiL<32&&macdL>macdSL) alerts.push({cls:'buy',title:'🎯 KAUF-SETUP ERKANNT!',desc:`RSI überverkauft (${rsiL.toFixed(0)}) + MACD bullisch. Guter Einstieg für LONG. Support: ${loR.toFixed(4)}`});
  if(rsiL>68&&macdL<macdSL) alerts.push({cls:'sell',title:'🎯 VERKAUF-SETUP ERKANNT!',desc:`RSI überkauft (${rsiL.toFixed(0)}) + MACD bärisch. Guter Einstieg für SHORT. Widerstand: ${hiR.toFixed(4)}`});
  if(bbL!=null&&bbL<0.05)   alerts.push({cls:'buy',title:'💥 AM UNTEREN BOLLINGER BAND!',desc:`Extremer Überverkauf — möglicher Rebound. Einstieg prüfen.`});
  if(bbL!=null&&bbL>0.95)   alerts.push({cls:'sell',title:'💥 AM OBEREN BOLLINGER BAND!',desc:`Extremer Überkauf — mögliche Umkehr.`});

  const alertEl=document.getElementById('entryAlert');
  if(alerts.length>0){
    alertEl.className='entry-alert '+alerts[0].cls;
    document.getElementById('entryTitle').textContent=alerts[0].title;
    document.getElementById('entryDesc').textContent=alerts[0].desc;
    alertEl.style.display='block';
  } else {
    alertEl.style.display='none';
  }

  const indRow=(name,val,s)=>`
    <div class="row">
      <span class="label">${name}</span>
      <span class="val">${val}</span>
      <span class="ind-${s}">${s==='buy'?'KAUF':s==='sell'?'VERK.':'HOLD'}</span>
    </div>`;

  const recText={
    buy:`📈 <strong>KAUFEN auf Plus500</strong> — ${buyC}/${total} Indikatoren bullisch. Support: ${loR.toFixed(4)} · Ziel: ${hiR.toFixed(4)}`,
    sell:`📉 <strong>VERKAUFEN auf Plus500</strong> — ${selC}/${total} Indikatoren bärisch. Widerstand: ${hiR.toFixed(4)} · Ziel: ${loR.toFixed(4)}`,
    hold:`⏸ <strong>ABWARTEN</strong> — Kein klares Signal (${buyC}× Kauf, ${selC}× Verkauf). Range: ${loR.toFixed(4)}–${hiR.toFixed(4)}`
  };

  document.getElementById('mainContent').innerHTML=`
    <div class="card">
      <div style="font-size:11px;color:#3a4455;margin-bottom:4px;">AKTUELLER KURS</div>
      <div class="price">${last.toFixed(4)}</div>
      <div class="change ${chg>=0?'up':'down'}">${chg>=0?'+':''}${chg.toFixed(4)} (${chgP>=0?'+':''}${chgP.toFixed(2)}%)</div>
    </div>

    <div class="signal ${cls}">
      <div style="font-size:11px;letter-spacing:2px;opacity:.6;">SIGNAL</div>
      <div class="signal-text">${sig}</div>
      <div class="signal-desc">${conf}% Konfidenz · ${conf>60?'Starkes':conf>30?'Moderates':'Schwaches'} Signal</div>
    </div>

    <div class="card">
      <div style="font-size:11px;color:#3a4455;margin-bottom:10px;">SIGNAL-STÄRKE</div>
      <div class="bar-wrap">
        <div class="bar-label"><span>BUY</span><span style="font-family:monospace">${buyC}/${total}</span></div>
        <div class="bar-track"><div class="bar-fill bar-buy" style="width:${buyC/total*100}%"></div></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-label"><span>SELL</span><span style="font-family:monospace">${selC}/${total}</span></div>
        <div class="bar-track"><div class="bar-fill bar-sell" style="width:${selC/total*100}%"></div></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-label"><span>HOLD</span><span style="font-family:monospace">${holC}/${total}</span></div>
        <div class="bar-track"><div class="bar-fill bar-hold" style="width:${holC/total*100}%"></div></div>
      </div>
    </div>

    <div class="card">
      <div style="font-size:11px;color:#3a4455;margin-bottom:10px;">TECHNISCHE INDIKATOREN</div>
      ${indRow('RSI (14)', rsiL.toFixed(1), sigs.rsi)}
      ${indRow('MACD', macdL.toFixed(5), sigs.macd)}
      ${indRow('SMA 20', sma20L.toFixed(4), sigs.sma20)}
      ${indRow('SMA 50', sma50L?sma50L.toFixed(4):'—', sigs.sma50)}
      ${indRow('Bollinger %B', bbL!=null?(bbL*100).toFixed(1)+'%':'—', sigs.bb)}
      ${indRow('Stochastic K', stochL!=null?stochL.toFixed(1):'—', sigs.stoch)}
      ${indRow('EMA 9/21', ema9L.toFixed(4)+'/'+ema21L.toFixed(4), sigs.ema)}
    </div>

    <div class="card">
      <div style="font-size:11px;color:#3a4455;margin-bottom:10px;">KEY LEVELS</div>
      ${indRow('Widerstand R1', hiR.toFixed(4), 'sell')}
      ${indRow('Aktuell', last.toFixed(4), cls)}
      ${indRow('Support S1', loR.toFixed(4), 'buy')}
    </div>

    <div class="card">
      <div style="font-size:11px;color:#3a4455;margin-bottom:8px;">EMPFEHLUNG FÜR PLUS500</div>
      <div style="font-size:13px;line-height:1.6;">${recText[cls]}</div>
    </div>

    <button class="btn" onclick="loadData()">↻ Aktualisieren</button>
    <div class="status">Letzte Aktualisierung: ${new Date().toLocaleTimeString('de-CH')} · Quelle: Frankfurter EZB API · Auto-Refresh 5 Min</div>
  `;
}

// Load on start + every 5 min
loadData();
setInterval(loadData, 5*60*1000);
</script>
</body>
</html>
