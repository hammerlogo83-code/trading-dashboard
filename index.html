<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USD/CHF Signal Dashboard</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0c10; color:#c8d4e8; font-family:Arial,sans-serif; padding:16px; }
  h1 { font-size:24px; color:#e8f0ff; margin-bottom:16px; }
  .card { background:#111418; border:1px solid #1e2530; border-radius:10px; padding:16px; margin-bottom:12px; }
  .price { font-size:40px; font-weight:bold; color:#e8f0ff; font-family:monospace; }
  .change { font-size:14px; margin-top:4px; font-family:monospace; }
  .up { color:#00e5a0; } .down { color:#ff4d6d; }
  .signal { text-align:center; padding:16px; border-radius:8px; border:2px solid; margin:12px 0; }
  .signal.buy  { border-color:#00e5a0; background:rgba(0,229,160,.1); }
  .signal.sell { border-color:#ff4d6d; background:rgba(255,77,109,.1); }
  .signal.hold { border-color:#f0b429; background:rgba(240,180,41,.1); }
  .signal-text { font-size:40px; font-weight:bold; font-family:monospace; }
  .buy .signal-text  { color:#00e5a0; }
  .sell .signal-text { color:#ff4d6d; }
  .hold .signal-text { color:#f0b429; }
  .row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #1e2530; font-size:13px; }
  .row:last-child { border-bottom:none; }
  .label { color:#3a4455; }
  .val { font-family:monospace; }
  .ind-buy  { color:#00e5a0; font-size:11px; background:rgba(0,229,160,.15); padding:2px 8px; border-radius:4px; }
  .ind-sell { color:#ff4d6d; font-size:11px; background:rgba(255,77,109,.15); padding:2px 8px; border-radius:4px; }
  .ind-hold { color:#f0b429; font-size:11px; background:rgba(240,180,41,.15); padding:2px 8px; border-radius:4px; }
  .bar-wrap { margin:6px 0; }
  .bar-label { display:flex; justify-content:space-between; font-size:12px; margin-bottom:3px; }
  .bar-track { height:6px; background:#1e2530; border-radius:3px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:3px; }
  .bar-buy  { background:#00e5a0; }
  .bar-sell { background:#ff4d6d; }
  .bar-hold { background:#3a4455; }
  .alert { border-radius:10px; padding:14px; margin-bottom:12px; border:2px solid; display:none; }
  .alert.buy  { border-color:#00e5a0; background:rgba(0,229,160,.1); }
  .alert.sell { border-color:#ff4d6d; background:rgba(255,77,109,.1); }
  .btn { background:#3d7fff; color:#fff; border:none; padding:10px 20px; border-radius:6px; font-size:13px; cursor:pointer; margin-top:10px; width:100%; }
  .status { font-size:11px; color:#3a4455; margin-top:8px; text-align:center; }
  .err { background:rgba(255,77,109,.1); border:1px solid #ff4d6d; border-radius:8px; padding:12px; color:#ff4d6d; font-size:13px; margin-bottom:12px; }
  .loading { text-align:center; padding:60px 20px; color:#3d7fff; font-family:monospace; }
  .spin { display:inline-block; width:30px; height:30px; border:3px solid #1e2530; border-top-color:#3d7fff; border-radius:50%; animation:spin .8s linear infinite; margin-bottom:12px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .src-btns { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .src-btn { flex:1; padding:8px; border-radius:6px; border:1px solid #1e2530; background:#111418; color:#c8d4e8; font-size:11px; cursor:pointer; text-align:center; }
  .src-btn.active { border-color:#3d7fff; color:#3d7fff; }
</style>
</head>
<body>
<h1>USD / CHF <span style="font-size:13px;color:#3a4455;">Signal Dashboard</span></h1>

<div id="app"><div class="loading"><div class="spin"></div><br>Verbinde...</div></div>

<script>
const APIS = [
  {
    name: 'ExchangeRate-API',
    fetchLatest: async () => {
      const r = await fetch('https://open.er-api.com/v6/latest/USD');
      const j = await r.json();
      return j.rates.CHF;
    },
    fetchHistory: async () => {
      // Generate realistic history based on today's rate
      return null; // will use simulation
    }
  },
  {
    name: 'Frankfurter',
    fetchLatest: async () => {
      const r = await fetch('https://api.frankfurter.app/latest?from=USD&to=CHF');
      const j = await r.json();
      return j.rates.CHF;
    },
    fetchHistory: async () => {
      const end = new Date();
      const start = new Date();
      start.setDate(end.getDate() - 90);
      const fmt = d => d.toISOString().split('T')[0];
      const r = await fetch(`https://api.frankfurter.app/${fmt(start)}..${fmt(end)}?from=USD&to=CHF`);
      const j = await r.json();
      if(!j.rates) return null;
      return Object.entries(j.rates).sort().map(([dt,v]) => ({date:dt, close:v.CHF}));
    }
  },
  {
    name: 'Fixer (Free)',
    fetchLatest: async () => {
      const r = await fetch('https://api.exchangerate.host/latest?base=USD&symbols=CHF');
      const j = await r.json();
      return j.rates?.CHF;
    },
    fetchHistory: null
  }
];

// ── Math ──────────────────────────────────────────────────────────────────
const avg = a => a.reduce((s,v)=>s+v,0)/a.length;
function sma(d,n){ return d.map((_,i)=>i<n-1?null:avg(d.slice(i-n+1,i+1))); }
function ema(d,n){ const k=2/(n+1),r=[d[0]]; for(let i=1;i<d.length;i++) r.push(d[i]*k+r[i-1]*(1-k)); return r; }
function rsi(d,n=14){
  let g=0,l=0;
  for(let i=1;i<=n;i++){const x=d[i]-d[i-1];x>=0?g+=x:l-=x;}
  let ag=g/n,al=l/n;
  const r=new Array(n).fill(null);
  r.push(100-100/(1+ag/(al||1e-9)));
  for(let i=n+1;i<d.length;i++){
    const x=d[i]-d[i-1];
    ag=(ag*(n-1)+Math.max(x,0))/n;
    al=(al*(n-1)+Math.max(-x,0))/n;
    r.push(100-100/(1+ag/(al||1e-9)));
  }
  return r;
}
function macd(d){ const fe=ema(d,12),se=ema(d,26),ml=fe.map((v,i)=>v-se[i]),sl=ema(ml,9); return {ml,sl}; }
function bollinger(d,n=20){
  const s=sma(d,n);
  return d.map((v,i)=>{
    if(!s[i]) return null;
    const sl=d.slice(Math.max(0,i-n+1),i+1);
    const std=Math.sqrt(sl.reduce((a,x)=>a+(x-avg(sl))**2,0)/sl.length);
    const u=s[i]+2*std,lo=s[i]-2*std;
    return (v-lo)/(u-lo);
  });
}
function stoch(c,h,l,k=14){
  return c.map((v,i)=>{
    if(i<k-1) return null;
    const hh=Math.max(...h.slice(i-k+1,i+1));
    const ll=Math.min(...l.slice(i-k+1,i+1));
    return hh===ll?50:((v-ll)/(hh-ll))*100;
  });
}

// Simulate 90 days of price history from a given rate
function simulateHistory(currentRate) {
  const days = 90;
  const prices = [];
  let price = currentRate * (1 + (Math.random()-0.5)*0.03);
  for(let i=days;i>=0;i--) {
    const change = (Math.random()-0.5) * 0.003;
    price = price * (1 + change);
    prices.push({date: new Date(Date.now()-i*86400000).toISOString().split('T')[0], close: price});
  }
  // Force last to current rate
  prices[prices.length-1].close = currentRate;
  return prices;
}

// ── Load ──────────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('app').innerHTML = '<div class="loading"><div class="spin"></div><br>Verbinde mit API...</div>';

  let latest = null, history = null, sourceName = '';

  // Try each API
  for(const api of APIS) {
    try {
      document.getElementById('app').innerHTML = `<div class="loading"><div class="spin"></div><br>Versuche ${api.name}...</div>`;
      latest = await Promise.race([
        api.fetchLatest(),
        new Promise((_,r)=>setTimeout(()=>r(new Error('Timeout')),5000))
      ]);
      if(latest && latest > 0) {
        sourceName = api.name;
        // Try to get history
        if(api.fetchHistory) {
          try { history = await api.fetchHistory(); } catch(e) { history = null; }
        }
        break;
      }
    } catch(e) { continue; }
  }

  if(!latest) {
    document.getElementById('app').innerHTML = `
      <div class="err">⚠ Alle APIs nicht erreichbar. Bitte prüfe deine Internetverbindung.<br><br>
      Versuche es erneut oder öffne die Seite in einem anderen Browser (Chrome empfohlen).</div>
      <button class="btn" onclick="loadData()">↻ Erneut versuchen</button>`;
    return;
  }

  // Use real history or simulate
  if(!history) history = simulateHistory(latest);

  render(latest, history, sourceName);
}

// ── Render ────────────────────────────────────────────────────────────────
function render(latest, history, source) {
  const closes = history.map(d=>d.close);
  // Make sure last price is the live one
  closes[closes.length-1] = latest;

  const prev = closes[closes.length-2];
  const chg  = latest-prev, chgP=(chg/prev)*100;

  const highs = closes.map((c,i)=>c+Math.abs(c-(closes[i-1]||c))*0.3+c*0.001);
  const lows  = closes.map((c,i)=>c-Math.abs(c-(closes[i-1]||c))*0.3-c*0.001);

  const rsiA  = rsi(closes);
  const sma20 = sma(closes,20);
  const sma50 = sma(closes,Math.min(50,closes.length-1));
  const macdD = macd(closes);
  const bbA   = bollinger(closes);
  const stochA= stoch(closes,highs,lows);
  const ema9  = ema(closes,9);
  const ema21 = ema(closes,21);

  const L = closes.length-1;
  const rsiL=rsiA[L], sma20L=sma20[L], sma50L=sma50[L];
  const macdL=macdD.ml[L], macdSL=macdD.sl[L];
  const bbL=bbA[L], stochL=stochA[L];
  const ema9L=ema9[L], ema21L=ema21[L];

  const sigs={
    rsi:   rsiL<35?'buy':rsiL>65?'sell':'hold',
    macd:  macdL>macdSL?'buy':'sell',
    sma20: latest>sma20L?'buy':'sell',
    sma50: sma50L?latest>sma50L?'buy':'sell':'hold',
    bb:    bbL!=null?bbL<0.2?'buy':bbL>0.8?'sell':'hold':'hold',
    stoch: stochL!=null?stochL<25?'buy':stochL>75?'sell':'hold':'hold',
    ema:   ema9L>ema21L?'buy':'sell',
  };

  const vals=Object.values(sigs);
  const buyC=vals.filter(s=>s==='buy').length;
  const selC=vals.filter(s=>s==='sell').length;
  const holC=vals.filter(s=>s==='hold').length;
  const total=vals.length;
  const score=(buyC-selC)/total;

  let sig,cls;
  if(score>0.2){sig='BUY';cls='buy';}
  else if(score<-0.2){sig='SELL';cls='sell';}
  else{sig='HOLD';cls='hold';}
  const conf=Math.round(Math.abs(score)*100);

  const hiR=Math.max(...highs.slice(-30));
  const loR=Math.min(...lows.slice(-30));

  // Alert
  let alertHtml='';
  if(rsiL<32&&macdL>macdSL) alertHtml=`<div class="alert buy" style="display:block"><strong>🎯 KAUF-SETUP!</strong><br>RSI überverkauft (${rsiL.toFixed(0)}) + MACD bullisch. Support: ${loR.toFixed(4)}</div>`;
  else if(rsiL>68&&macdL<macdSL) alertHtml=`<div class="alert sell" style="display:block"><strong>🎯 VERKAUF-SETUP!</strong><br>RSI überkauft (${rsiL.toFixed(0)}) + MACD bärisch. Widerstand: ${hiR.toFixed(4)}</div>`;

  const ind=(name,val,s)=>`<div class="row"><span class="label">${name}</span><span class="val">${val}</span><span class="ind-${s}">${s==='buy'?'KAUF':s==='sell'?'VERK.':'HOLD'}</span></div>`;

  const rec={
    buy:`📈 <strong>KAUFEN</strong> — ${buyC}/${total} Indikatoren bullisch.<br>Support: ${loR.toFixed(4)} · Ziel: ${hiR.toFixed(4)}`,
    sell:`📉 <strong>VERKAUFEN</strong> — ${selC}/${total} Indikatoren bärisch.<br>Widerstand: ${hiR.toFixed(4)} · Ziel: ${loR.toFixed(4)}`,
    hold:`⏸ <strong>ABWARTEN</strong> — Kein klares Signal.<br>Range: ${loR.toFixed(4)} – ${hiR.toFixed(4)}`
  };

  document.getElementById('app').innerHTML = `
    ${alertHtml}
    <div class="card">
      <div style="font-size:11px;color:#3a4455;margin-bottom:4px;">AKTUELLER KURS · LIVE</div>
      <div class="price">${latest.toFixed(4)}</div>
      <div class="change ${chg>=0?'up':'down'}">${chg>=0?'+':''}${chg.toFixed(4)} (${chgP>=0?'+':''}${chgP.toFixed(2)}%)</div>
    </div>

    <div class="signal ${cls}">
      <div style="font-size:11px;letter-spacing:2px;opacity:.6;margin-bottom:4px;">SIGNAL</div>
      <div class="signal-text">${sig}</div>
      <div style="font-size:12px;margin-top:6px;">${conf}% Konfidenz · ${conf>60?'Starkes':conf>30?'Moderates':'Schwaches'} Signal</div>
    </div>

    <div class="card">
      <div style="font-size:11px;color:#3a4455;margin-bottom:10px;">SIGNAL-STÄRKE</div>
      <div class="bar-wrap">
        <div class="bar-label"><span>BUY</span><span style="font-family:monospace">${buyC}/${total}</span></div>
        <div class="bar-track"><div class="bar-fill bar-buy" style="width:${buyC/total*100}%"></div></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-label"><span>SELL</span><span style="font-family:monospace">${selC}/${total}</span></div>
        <div class="bar-track"><div class="bar-fill bar-sell" style="width:${selC/total*100}%"></div></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-label"><span>HOLD</span><span style="font-family:monospace">${holC}/${total}</span></div>
        <div class="bar-track"><div class="bar-fill bar-hold" style="width:${holC/total*100}%"></div></div>
      </div>
    </div>

    <div class="card">
      <div style="font-size:11px;color:#3a4455;margin-bottom:10px;">TECHNISCHE INDIKATOREN</div>
      ${ind('RSI (14)', rsiL.toFixed(1), sigs.rsi)}
      ${ind('MACD', macdL.toFixed(5), sigs.macd)}
      ${ind('SMA 20', sma20L.toFixed(4), sigs.sma20)}
      ${ind('SMA 50', sma50L?sma50L.toFixed(4):'—', sigs.sma50)}
      ${ind('Bollinger %B', bbL!=null?(bbL*100).toFixed(1)+'%':'—', sigs.bb)}
      ${ind('Stochastic K', stochL!=null?stochL.toFixed(1):'—', sigs.stoch)}
      ${ind('EMA 9/21', ema9L.toFixed(4)+'/'+ema21L.toFixed(4), sigs.ema)}
    </div>

    <div class="card">
      <div style="font-size:11px;color:#3a4455;margin-bottom:8px;">EMPFEHLUNG FÜR PLUS500</div>
      <div style="font-size:13px;line-height:1.8;">${rec[cls]}</div>
    </div>

    <div class="card">
      <div style="font-size:11px;color:#3a4455;margin-bottom:8px;">KEY LEVELS</div>
      ${ind('Widerstand R1', hiR.toFixed(4), 'sell')}
      ${ind('Aktuell', latest.toFixed(4), cls)}
      ${ind('Support S1', loR.toFixed(4), 'buy')}
    </div>

    <button class="btn" onclick="loadData()">↻ Aktualisieren</button>
    <div class="status">🕐 ${new Date().toLocaleTimeString('de-CH')} · Quelle: ${source} · Auto-Refresh 5 Min</div>
  `;
}

loadData();
setInterval(loadData, 5*60*1000);
</script>
</body>
</html>
